<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TerraKur – Беговой трекер</title>
  <!-- MapLibre GL CSS -->
  <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #map {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 2;
      padding: 0 16px;
    }
    button {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.1s ease;
    }
    button:active {
      transform: scale(0.96);
    }
    .stats {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      color: white;
      z-index: 2;
      font-size: 14px;
      pointer-events: none;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }
    .stat-label {
      font-size: 10px;
      opacity: 0.7;
    }
    .hidden {
      display: none;
    }
    #status {
      position: fixed;
      bottom: 90px;
      left: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: #ffaa00;
      text-align: center;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 2;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="statsPanel" class="stats hidden">
    <div><span class="stat-value" id="time">00:00</span><br><span class="stat-label">Время</span></div>
    <div><span class="stat-value" id="distance">0.00</span><br><span class="stat-label">км</span></div>
    <div><span class="stat-value" id="pace">0'00"</span><br><span class="stat-label">темп</span></div>
  </div>
  <div class="controls">
    <button id="freeRunBtn">🏃 Свободная</button>
    <button id="routesBtn">📋 Маршруты</button>
    <button id="historyBtn">📅 История</button>
  </div>
  <div id="status"></div>

  <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
