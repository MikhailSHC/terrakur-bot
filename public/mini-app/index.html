<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>TerraKur – Беговой трекер</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <!-- MapLibre GL JS CSS -->
  <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #map {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    /* Панель управления */
    .controls {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 2;
      padding: 0 16px;
    }
    button {
      background: #1a1a2e;
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.7);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.2s;
    }
    button:active {
      transform: scale(0.96);
    }
    .stats {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      color: white;
      font-weight: 500;
      z-index: 2;
      font-size: 14px;
      pointer-events: none;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }
    .stat-label {
      font-size: 10px;
      opacity: 0.7;
    }
    .hidden {
      display: none;
    }
    #status {
      position: fixed;
      bottom: 100px;
      left: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: #ffaa00;
      text-align: center;
      padding: 8px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="stats hidden" id="statsPanel">
    <div class="stat-item"><div class="stat-value" id="time">00:00</div><div class="stat-label">Время</div></div>
    <div class="stat-item"><div class="stat-value" id="distance">0.00</div><div class="stat-label">км</div></div>
    <div class="stat-item"><div class="stat-value" id="pace">0'00"</div><div class="stat-label">темп</div></div>
  </div>
  <div class="controls">
    <button id="freeRunBtn">🏃 Свободная</button>
    <button id="routesBtn">📋 Маршруты</button>
    <button id="historyBtn">📅 История</button>
  </div>
  <div id="status"></div>

  <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
